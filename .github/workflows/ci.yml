name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      UI_BASE_URL: http://localhost:5173
      BACKEND_BASE_URL: http://localhost:8080
      HEADLESS: true

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # --- Frontend: install + build with Linux lockfile fallback ---
      - name: Install deps and build frontend (robust against Rollup optional deps bug)
        working-directory: ./frontend
        run: |
          set -euxo pipefail

          # First attempt: fast path with Windows-generated lockfile
          rm -rf node_modules
          npm ci --no-audit --fund=false || true

          # Try building once
          if npm run build; then
            echo "Vite build succeeded on first attempt."
            exit 0
          fi

          echo "Vite build failed; retrying with clean Linux lockfile due to Rollup optional-deps bug..."

          # Second attempt: clean install with a fresh lockfile for Linux
          rm -rf node_modules package-lock.json
          npm install --no-audit --fund=false
          npm run build

      - name: Start Vite preview (5173) in background
        working-directory: ./frontend
        run: |
          npx vite preview --host --port 5173 > /tmp/vite.log 2>&1 &
          echo $! > /tmp/vite.pid
          for i in {1..120}; do
            if curl -fsS http://localhost:5173 >/dev/null; then
              echo "Vite preview is up"; exit 0
            fi
            echo "Waiting for Vite preview... ($i)"; sleep 1
          done
          echo "Vite preview failed to start"; exit 1

      # --- Backend: start app for UI to call /api ---
      - name: Start backend on :8080 (background)
        working-directory: ./backend/backend
        env:
          SPRING_PROFILES_ACTIVE: ""
        run: |
          mvn -q -DskipTests spring-boot:run > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in {1..120}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null || \
               curl -fsS http://localhost:8080/ >/dev/null; then
              echo "Backend is up"; exit 0
            fi
            echo "Waiting for backend... ($i)"; sleep 1
          done
          echo "Backend failed to start"; tail -n 200 /tmp/backend.log || true; exit 1

      # --- All tests (unit + API + BDD + Selenium) ---
      - name: Maven verify (unit, BDD, API, Selenium) - headless via Xvfb
        working-directory: ./backend/backend
        env:
          UI_BASE_URL: ${{ env.UI_BASE_URL }}
          BACKEND_BASE_URL: ${{ env.BACKEND_BASE_URL }}
          HEADLESS: ${{ env.HEADLESS }}
        run: |
          xvfb-run -a mvn -B clean verify \
            -DUI_BASE_URL=${UI_BASE_URL} \
            -DBACKEND_BASE_URL=${BACKEND_BASE_URL} \
            -DHEADLESS=${HEADLESS}

      # --- Artifacts (reports + logs only) ---
      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-reports
          path: |
            backend/backend/target/surefire-reports/**
            backend/backend/target/failsafe-reports/**
            backend/backend/target/site/jacoco/**
          if-no-files-found: ignore

      - name: Archive service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            /tmp/vite.log
            /tmp/backend.log
          if-no-files-found: ignore

      # --- Teardown ---
      - name: Stop services
        if: always()
        run: |
          kill -9 $(cat /tmp/vite.pid) 2>/dev/null || true
          kill -9 $(cat /tmp/backend.pid) 2>/dev/null || true
